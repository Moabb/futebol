<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay - Fim de Jogo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Space+Grotesk:wght=500;700&family=Kanit:wght=600;800&display=swap');

        /* Configuração de transparência absoluta para o OBS Studio */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
        }

        #endgame-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            width: 950px;
            padding: 40px;
            box-sizing: border-box;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        #endgame-wrapper.visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .main-container {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.98) 0%, rgba(30, 27, 75, 0.98) 100%);
            border: 3px solid #f59e0b;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            position: relative;
        }

        .header-badge {
            display: inline-block;
            background: #f59e0b;
            color: #000000;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 900;
            padding: 6px 24px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 35px;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        /* Grid de Placar Principal */
        .scoreboard-grid {
            display: grid;
            grid-template-columns: 1fr 180px 1fr;
            align-items: center;
            gap: 20px;
        }

        .team-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.5s ease;
        }

        /* Efeito brilhante para destacar o vencedor da partida */
        .team-block.winner {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(255,255,255,0.02) 100%);
            border-color: rgba(245, 158, 11, 0.4);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.15);
        }

        .team-color-indicator {
            width: 45px;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .team-name {
            font-family: 'Kanit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            max-width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 84px;
            font-weight: 900;
            line-height: 1;
            margin-top: 15px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .center-vs {
            font-family: 'Kanit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Caixa de Resultados de Pênaltis Ocultável */
        .penalties-box {
            margin-top: 35px;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px dashed rgba(245, 158, 11, 0.3);
            display: none; /* Controlado dinamicamente via JS */
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .penalties-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #f59e0b;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .penalties-score-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #ffffff;
        }

        .pen-label {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="endgame-wrapper">
        <div class="main-container">
            <div class="header-badge">Fim de Jogo</div>
            
            <div class="scoreboard-grid">
                <div class="team-block" id="block-home">
                    <div class="team-color-indicator" id="color-home"></div>
                    <div class="team-name" id="name-home">CASA</div>
                    <div class="score-display" id="score-home">0</div>
                </div>

                <div class="center-vs">FIM</div>

                <div class="team-block" id="block-away">
                    <div class="team-color-indicator" id="color-away"></div>
                    <div class="team-name" id="name-away">VISITANTE</div>
                    <div class="score-display" id="score-away">0</div>
                </div>
            </div>

            <div class="penalties-box" id="ui-penalties-box">
                <div class="penalties-title">Decisão por Pênaltis</div>
                <div class="penalties-score-row">
                    <span id="pen-score-home">0</span>
                    <span class="pen-label">X</span>
                    <span id="pen-score-away">0</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByxKPf3WJgGDLUiPNI_QnEmgsAn0y8s3k",
            authDomain: "moabb-futebol.firebaseapp.com",
            databaseURL: "https://moabb-futebol-default-rtdb.firebaseio.com",
            projectId: "moabb-futebol",
            storageBucket: "moabb-futebol.firebasestorage.app",
            messagingSenderId: "154044624617",
            appId: "1:154044624617:web:cbe332c5b1c468bd270a78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const activeMatchRef = ref(db, 'activeMatchId');

        onValue(activeMatchRef, (snapshot) => {
            const activeId = snapshot.val() || "jogo_padrao";
            const matchRef = ref(db, 'matches/' + activeId);

            onValue(matchRef, (matchSnapshot) => {
                const data = matchSnapshot.val();
                if (!data) return;

                // 1. Configurações básicas de Nomes e Cores
                const configHome = data.config?.home || {};
                const configAway = data.config?.away || {};

                document.getElementById('name-home').textContent = configHome.name || "CASA";
                document.getElementById('name-away').textContent = configAway.name || "VISITANTE";
                document.getElementById('color-home').style.backgroundColor = configHome.color1 || "#3b82f6";
                document.getElementById('color-away').style.backgroundColor = configAway.color1 || "#ef4444";

                // 2. Leitura dos Gols do Tempo Regular
                const goalsHome = parseInt(data.score?.home ?? 0);
                const goalsAway = parseInt(data.score?.away ?? 0);
                document.getElementById('score-home').textContent = goalsHome;
                document.getElementById('score-away').textContent = goalsAway;

                // 3. Controle Geral de Exibição da Tela Cheia
                const wrapper = document.getElementById('endgame-wrapper');
                if (data.overlays?.endgame === true) {
                    wrapper.classList.add('visible');
                } else {
                    wrapper.classList.remove('visible');
                }

                // 4. LEITURA PRECISA DA SUBPASTA REAL DE PÊNALTIS
                const penData = data.penalties || {};
                
                const getSortedShots = (shotsObj) => {
                    if (!shotsObj) return [];
                    if (Array.isArray(shotsObj)) return shotsObj;
                    return Object.keys(shotsObj)
                        .sort((a, b) => parseInt(a) - parseInt(b))
                        .map(key => shotsObj[key]);
                };

                const homeShots = getSortedShots(penData.home);
                const awayShots = getSortedShots(penData.away);

                // Conta quantos gols reais (valor 1) foram convertidos de cada lado
                const penGoalsHome = homeShots.filter(status => String(status).trim() === '1').length;
                const penGoalsAway = awayShots.filter(status => String(status).trim() === '1').length;

                // CONDIÇÃO EXIGIDA: Se ambos forem 0, oculta. Se qualquer um for maior que 0, exibe!
                const penBox = document.getElementById('ui-penalties-box');
                if (penGoalsHome > 0 || penGoalsAway > 0) {
                    penBox.style.display = 'block';
                    document.getElementById('pen-score-home').textContent = penGoalsHome;
                    document.getElementById('pen-score-away').textContent = penGoalsAway;
                } else {
                    penBox.style.display = 'none';
                }

                // 5. Determinar o Vencedor Absoluto para Destacar Visualmente
                const blockHome = document.getElementById('block-home');
                const blockAway = document.getElementById('block-away');
                
                blockHome.classList.remove('winner');
                blockAway.classList.remove('winner');

                const totalScoreHome = goalsHome + (penGoalsHome * 0.1); // Peso leve para desempate visual
                const totalScoreAway = goalsAway + (penGoalsAway * 0.1);

                if (goalsHome > goalsAway || (goalsHome === goalsAway && penGoalsHome > penGoalsAway)) {
                    blockHome.classList.add('winner');
                } else if (goalsAway > goalsHome || (goalsHome === goalsAway && penGoalsAway > penGoalsHome)) {
                    blockAway.classList.add('winner');
                }
            });
        });
    </script>
</body>
</html>
