<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay - Disputa de Pênaltis</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Space+Grotesk:wght=500;700&family=Kanit:wght=600;800&display=swap');

        /* Configuração de transparência absoluta para o OBS Studio */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
        }

        #penalties-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            width: 850px;
            padding: 25px 35px;
            box-sizing: border-box;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        #penalties-wrapper.visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .penalties-container {
            background: linear-gradient(135deg, rgba(30, 27, 75, 0.98) 0%, rgba(15, 23, 42, 0.98) 100%);
            border: 2px solid #f59e0b;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        .header-title {
            text-align: center;
            font-family: 'Kanit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f59e0b;
            margin-bottom: 25px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .team-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
        }

        .team-row:last-child {
            margin-bottom: 0;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-indicator {
            width: 14px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .team-name {
            font-family: 'Kanit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .shots-track {
            display: flex;
            gap: 12px;
        }

        .ball-slot {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* GOL */
        .ball-slot.success {
            background: radial-gradient(circle at 35% 35%, #10b981 0%, #047857 100%);
            border-color: #34d399;
            color: #ffffff;
            font-size: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
            transform: scale(1.05);
        }

        /* ERRO */
        .ball-slot.miss {
            background: radial-gradient(circle at 35% 35%, #ef4444 0%, #b91c1c 100%);
            border-color: #f87171;
            color: #ffffff;
            font-size: 18px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            transform: scale(1.05);
        }

        /* PRÓXIMO BATEDOR (PISCANTE AMRELO) */
        .ball-slot.next {
            background: rgba(245, 158, 11, 0.15);
            border-color: #f59e0b;
            color: #f59e0b;
            animation: pulse-active 1.4s infinite alternate;
        }

        @keyframes pulse-active {
            0% {
                box-shadow: 0 0 4px rgba(245, 158, 11, 0.2);
                background: rgba(245, 158, 11, 0.1);
            }
            100% {
                box-shadow: 0 0 16px rgba(245, 158, 11, 0.6);
                background: rgba(245, 158, 11, 0.35);
            }
        }
    </style>
</head>
<body>

    <div id="penalties-wrapper">
        <div class="penalties-container">
            <div class="header-title">Disputa de Pênaltis</div>
            
            <div class="team-row">
                <div class="team-info">
                    <div class="color-indicator" id="color-home"></div>
                    <div class="team-name" id="team-name-home">CASA</div>
                </div>
                <div class="shots-track" id="track-home"></div>
            </div>

            <div class="team-row">
                <div class="team-info">
                    <div class="color-indicator" id="color-away"></div>
                    <div class="team-name" id="team-name-away">VISITANTE</div>
                </div>
                <div class="shots-track" id="track-away"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByxKPf3WJgGDLUiPNI_QnEmgsAn0y8s3k",
            authDomain: "moabb-futebol.firebaseapp.com",
            databaseURL: "https://moabb-futebol-default-rtdb.firebaseio.com",
            projectId: "moabb-futebol",
            storageBucket: "moabb-futebol.firebasestorage.app",
            messagingSenderId: "154044624617",
            appId: "1:154044624617:web:cbe332c5b1c468bd270a78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const activeMatchRef = ref(db, 'activeMatchId');

        onValue(activeMatchRef, (snapshot) => {
            const activeId = snapshot.val() || "jogo_padrao";
            const matchRef = ref(db, 'matches/' + activeId);

            onValue(matchRef, (matchSnapshot) => {
                const data = matchSnapshot.val();
                if (!data) return;

                // 1. Renderiza os nomes e cores dos times nas penalidades (IDs Corrigidos para casar com o HTML)
                const configHome = data.config?.home || {};
                const configAway = data.config?.away || {};

                document.getElementById('team-name-home').textContent = configHome.name || "CASA";
                document.getElementById('team-name-away').textContent = configAway.name || "VISITANTE";

                document.getElementById('color-home').style.backgroundColor = configHome.color1 || "#3b82f6";
                document.getElementById('color-away').style.backgroundColor = configAway.color1 || "#ef4444";

                // 2. Controla a visibilidade geral da overlay de Pênaltis
                const wrapper = document.getElementById('penalties-wrapper');
                if (data.overlays?.penalties === true) {
                    wrapper.classList.add('visible');
                } else {
                    wrapper.classList.remove('visible');
                }

                // 3. Puxa os dados brutos de pênaltis do Firebase
                const penData = data.penalties || {};
                
                // Converte os objetos de cobrança do Firebase em arrays tratáveis de forma segura
                const rawHome = penData.shotsHome ? (Array.isArray(penData.shotsHome) ? penData.shotsHome : Object.values(penData.shotsHome)) : [];
                const rawAway = penData.shotsAway ? (Array.isArray(penData.shotsAway) ? penData.shotsAway : Object.values(penData.shotsAway)) : [];

                // 4. Renderiza as esteiras passando os dados brutos e o batedor da vez
                renderTrack('home', rawHome, penData.currentSide === 'home' ? penData.currentIndex : -1);
                renderTrack('away', rawAway, penData.currentSide === 'away' ? penData.currentIndex : -1);
            });
        });

        function renderTrack(side, shotsArray, activeIndex) {
            const trackContainer = document.getElementById(`track-${side}`);
            trackContainer.innerHTML = '';

            // Mapeia e extrai o status estruturado do objeto do Firebase sem jogar fora as linhas
            const cleanShots = shotsArray.map(item => {
                if (!item) return '';
                const value = (typeof item === 'object' && item.status) ? item.status : item;
                return String(value).toUpperCase().trim();
            });

            // Garante o layout visual mínimo estável de 5 bolinhas na tela
            const totalSlots = Math.max(5, cleanShots.length + (activeIndex !== -1 ? 1 : 0));

            for (let i = 0; i < totalSlots; i++) {
                const slot = document.createElement('div');
                slot.className = 'ball-slot';
                slot.textContent = i + 1;

                // Aplicação correta de cores conforme o status tratado do Firebase
                if (cleanShots[i] === 'SUCCESS') {
                    slot.className = 'ball-slot success';
                    slot.innerHTML = '✓';
                } else if (cleanShots[i] === 'MISS') {
                    slot.className = 'ball-slot miss';
                    slot.innerHTML = '✕';
                } else if (i === activeIndex) {
                    slot.className = 'ball-slot next'; // Bolinha amarela animada da cobrança atual
                }

                trackContainer.appendChild(slot);
            }
        }
    </script>
</body>
</html>
