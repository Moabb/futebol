<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Overlay - Disputa de Pênaltis</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Space+Grotesk:wght=500;700&family=Kanit:wght=600;800&display=swap');

        /* Configuração de transparência absoluta para o OBS Studio */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
        }

        #penalties-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            width: 850px;
            padding: 25px 35px;
            box-sizing: border-box;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        #penalties-wrapper.visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .penalties-container {
            background: linear-gradient(135deg, rgba(30, 27, 75, 0.98) 0%, rgba(15, 23, 42, 0.98) 100%);
            border: 2px solid #f59e0b;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        .header-title {
            text-align: center;
            font-family: 'Kanit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f59e0b;
            margin-bottom: 25px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .team-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
        }

        .team-row:last-child {
            margin-bottom: 0;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-indicator {
            width: 14px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .team-name {
            font-family: 'Kanit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .shots-track {
            display: flex;
            gap: 12px;
        }

        .ball-slot {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* GOL (Valor 1) */
        .ball-slot.success {
            background: radial-gradient(circle at 35% 35%, #10b981 0%, #047857 100%) !important;
            border-color: #34d399 !important;
            color: #ffffff !important;
            font-size: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
            transform: scale(1.05);
        }

        /* ERROU (Valor 2) */
        .ball-slot.miss {
            background: radial-gradient(circle at 35% 35%, #ef4444 0%, #b91c1c 100%) !important;
            border-color: #f87171 !important;
            color: #ffffff !important;
            font-size: 18px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            transform: scale(1.05);
        }

        /* PRÓXIMO BATEDOR */
        .ball-slot.next {
            background: rgba(245, 158, 11, 0.15) !important;
            border-color: #f59e0b !important;
            color: #f59e0b !important;
            animation: pulse-active 1.4s infinite alternate;
        }

        @keyframes pulse-active {
            0% { box-shadow: 0 0 4px rgba(245, 158, 11, 0.2); background: rgba(245, 158, 11, 0.1); }
            100% { box-shadow: 0 0 16px rgba(245, 158, 11, 0.6); background: rgba(245, 158, 11, 0.35); }
        }

        #debug-box {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 500px;
            max-height: 250px;
            background: rgba(0, 0, 0, 0.95);
            color: #10b981;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 6px;
            overflow-y: auto;
            z-index: 99999;
        }
    </style>
</head>
<body>

    <div id="debug-box">Conectando...</div>

    <div id="penalties-wrapper">
        <div class="penalties-container">
            <div class="header-title">Disputa de Pênaltis</div>
            
            <div class="team-row">
                <div class="team-info">
                    <div class="color-indicator" id="color-home"></div>
                    <div class="team-name" id="team-name-home">CASA</div>
                </div>
                <div class="shots-track" id="track-home"></div>
            </div>

            <div class="team-row">
                <div class="team-info">
                    <div class="color-indicator" id="color-away"></div>
                    <div class="team-name" id="team-name-away">VISITANTE</div>
                </div>
                <div class="shots-track" id="track-away"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByxKPf3WJgGDLUiPNI_QnEmgsAn0y8s3k",
            authDomain: "moabb-futebol.firebaseapp.com",
            databaseURL: "https://moabb-futebol-default-rtdb.firebaseio.com",
            projectId: "moabb-futebol",
            storageBucket: "moabb-futebol.firebasestorage.app",
            messagingSenderId: "154044624617",
            appId: "1:154044624617:web:cbe332c5b1c468bd270a78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const activeMatchRef = ref(db, 'activeMatchId');
        const debugBox = document.getElementById('debug-box');

        onValue(activeMatchRef, (snapshot) => {
            const activeId = snapshot.val() || "jogo_padrao";
            const matchRef = ref(db, 'matches/' + activeId);

            onValue(matchRef, (matchSnapshot) => {
                const data = matchSnapshot.val();
                if (!data) return;

                // Nomes e cores do painel
                const configHome = data.config?.home || {};
                const configAway = data.config?.away || {};
                document.getElementById('team-name-home').textContent = configHome.name || "CASA";
                document.getElementById('team-name-away').textContent = configAway.name || "VISITANTE";
                document.getElementById('color-home').style.backgroundColor = configHome.color1 || "#3b82f6";
                document.getElementById('color-away').style.backgroundColor = configAway.color1 || "#ef4444";

                // Sempre deixa visível para fins de teste e acerto das bolinhas
                document.getElementById('penalties-wrapper').classList.add('visible');

                // VARREDURA DETECTORA: Busca os pênaltis onde quer que eles estejam salvos
                let penData = data.penalties || data || {};
                
                let sHome = penData.shotsHome;
                let sAway = penData.shotsAway;
                let cTeam = penData.currentTeam;
                let cShot = penData.currentShot;

                // SISTEMA AUTO-REPARADOR DE SEGURANÇA: Se o banco estiver totalmente vazio, preenche dados simulados na tela
                let usandoSimulacao = false;
                if (sHome === undefined && sAway === undefined) {
                    usandoSimulacao = true;
                    sHome = [1, 2, 1]; // Simula: Gol, Erro, Gol
                    sAway = [1, 1, 2]; // Simula: Gol, Gol, Erro
                    cTeam = "home";
                    cShot = 3;
                }

                // Atualiza o painel de diagnóstico
                debugBox.innerHTML = `<strong>ID ATIVO:</strong> ${activeId}<br>` +
                                     `<strong>Status do Banco:</strong> ${usandoSimulacao ? '⚠️ Vazio (Usando Simulação)' : '✅ Dados Encontrados!'}<br>` +
                                     `<strong>shotsHome bruto:</strong> ${JSON.stringify(penData.shotsHome)}<br>` +
                                     `<strong>Todo o Nó de Pênaltis:</strong> ${JSON.stringify(penData)}`;

                const getSortedShots = (shotsObj) => {
                    if (!shotsObj) return [];
                    if (Array.isArray(shotsObj)) return shotsObj;
                    return Object.keys(shotsObj)
                        .sort((a, b) => parseInt(a) - parseInt(b))
                        .map(key => shotsObj[key]);
                };

                const finalHomeArray = getSortedShots(sHome);
                const finalAwayArray = getSortedShots(sAway);
                const activeIndex = (cShot !== undefined) ? parseInt(cShot) : -1;

                renderTrack('home', finalHomeArray, cTeam === 'home' ? activeIndex : -1);
                renderTrack('away', finalAwayArray, cTeam === 'away' ? activeIndex : -1);
            });
        });

        function renderTrack(side, shotsArray, activeIndex) {
            const trackContainer = document.getElementById(`track-${side}`);
            trackContainer.innerHTML = '';

            const cleanShots = (shotsArray || []).map(item => {
                if (item === null || item === undefined) return '0';
                return String(item).trim();
            });

            const totalSlots = Math.max(5, cleanShots.length);

            for (let i = 0; i < totalSlots; i++) {
                const slot = document.createElement('div');
                slot.className = 'ball-slot';
                slot.textContent = i + 1;

                if (cleanShots[i] === '1') {
                    slot.className = 'ball-slot success';
                    slot.innerHTML = '✓';
                } else if (cleanShots[i] === '2') {
                    slot.className = 'ball-slot miss';
                    slot.innerHTML = '✕';
                } else if (i === activeIndex) {
                    slot.className = 'ball-slot next';
                }

                trackContainer.appendChild(slot);
            }
        }
    </script>
</body>
</html>
