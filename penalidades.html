<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay - Disputa de Pênaltis</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@500;700&family=Kanit:wght@600;800&display=swap');

        /* Configuração de transparência absoluta para o OBS Studio */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
        }

        #penalties-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            width: 850px;
            padding: 25px 35px;
            box-sizing: border-box;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        #penalties-wrapper.visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        /* --- TÍTULO PRINCIPAL --- */
        .title-panel {
            text-align: center;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        .title-panel span {
            color: var(--theme-accent);
        }

        /* --- CONTÊINER DAS EQUIPES --- */
        .teams-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .team-row {
            display: grid;
            grid-template-columns: 200px 70px 1fr;
            align-items: center;
            gap: 20px;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            flex-shrink: 0;
        }

        /* --- PLACAR TOTAL DE PÊNALTIS --- */
        .penalty-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- ESTRELA/CÍRCULO DAS COBRANÇAS --- */
        .shots-track {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ball-slot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* Estados das Cobranças */
        .ball-slot.success {
            background: #10b981;
            border-color: #10b981;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.6);
            transform: scale(1.05);
        }

        .ball-slot.miss {
            background: #ef4444;
            border-color: #ef4444;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
            transform: scale(1.05);
        }

        .ball-slot.next {
            border-color: var(--theme-accent);
            animation: pulseCurrent 1.5s infinite;
        }

        @keyframes pulseCurrent {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        /* ======================================================= */
        /* TEMAS ADAPTATIVOS COM O PAINEL                           */
        /* ======================================================= */
        
        /* ESTILO 1: CYBER NEO */
        .theme-cyber {
            background: var(--theme-primary);
            border: 2px solid var(--theme-accent);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .theme-cyber .penalty-score { color: var(--theme-accent); }

        /* ESTILO 2: ASYMMETRIC EDGE */
        .theme-minimal { transform: skewX(-8px) translate(-50%, -60%); }
        .theme-minimal.visible { transform: skewX(-8px) translate(-50%, -50%); }
        .theme-minimal { background: var(--theme-primary); border-left: 8px solid var(--theme-accent); box-shadow: 10px 10px 0px rgba(0,0,0,0.3); }
        .theme-minimal .ball-slot { transform: skewX(8px); }
        .theme-minimal .ball-slot.success, .theme-minimal .ball-slot.miss { transform: skewX(8px) scale(1.05); }
        .theme-minimal span, .theme-minimal div:not(.ball-slot) { transform: skewX(8px); }

        /* ESTILO 3: NEO-CLASSIC TV */
        .theme-monolith { font-family: 'Kanit', sans-serif; background: rgba(15, 23, 42, 0.95); border-radius: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .theme-monolith .title-panel { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
        .theme-monolith .penalty-score { background: var(--theme-accent); color: #0f172a; border: none; }
    </style>
</head>
<body>

    <div id="penalties-wrapper" class="theme-cyber">
        
        <div class="title-panel">
            Disputa de <span>Pênaltis</span> alternados
        </div>

        <div class="teams-container">
            
            <div class="team-row">
                <div class="team-info">
                    <div class="color-dot" id="dot-home"></div>
                    <span id="txt-home-name">CASA</span>
                </div>
                <div class="penalty-score" id="score-home-penalties">0</div>
                <div class="shots-track" id="track-home"></div>
            </div>

            <div class="team-row">
                <div class="team-info">
                    <div class="color-dot" id="dot-away"></div>
                    <span id="txt-away-name">VISITANTE</span>
                </div>
                <div class="penalty-score" id="score-away-penalties">0</div>
                <div class="shots-track" id="track-away"></div>
            </div>

        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByxKPf3WJgGDLUiPNI_QnEmgsAn0y8s3k",
            authDomain: "moabb-futebol.firebaseapp.com",
            databaseURL: "https://moabb-futebol-default-rtdb.firebaseio.com",
            projectId: "moabb-futebol",
            storageBucket: "moabb-futebol.firebasestorage.app",
            messagingSenderId: "154044624617",
            appId: "1:154044624617:web:cbe332c5b1c468bd270a78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ========================================================
        // ESCUTA DA PARTIDA ATIVA EM TEMPO REAL
        // ========================================================
        const activeMatchRef = ref(db, 'activeMatchId');

        // Substitua a partir daqui até o final do seu <script>
        onValue(activeMatchRef, (snapshot) => {
            const activeId = snapshot.val() || "jogo_padrao";
            const matchRef = ref(db, 'matches/' + activeId);

            onValue(matchRef, (matchSnapshot) => {
                const data = matchSnapshot.val();
                if (!data) return;

                // 1. Renderiza os nomes e cores dos times nas penalidades
                const configHome = data.config?.home || {};
                const configAway = data.config?.away || {};

                document.getElementById('name-home').textContent = configHome.name || "CASA";
                document.getElementById('name-away').textContent = configAway.name || "VISITANTE";

                document.getElementById('color-home').style.backgroundColor = configHome.color1 || "#3b82f6";
                document.getElementById('color-away').style.backgroundColor = configAway.color1 || "#ef4444";

                // 2. Controla a visibilidade geral da overlay de Pênaltis
                const wrapper = document.getElementById('penalties-wrapper');
                if (data.overlays?.penalties === true) {
                    wrapper.classList.add('visible');
                } else {
                    wrapper.classList.remove('visible');
                }

                // 3. Puxa os dados brutos de pênaltis do Firebase
                const penData = data.penalties || {};
                
                // Converte os objetos de cobrança do Firebase em arrays tratáveis
                const rawHome = penData.shotsHome ? (Array.isArray(penData.shotsHome) ? penData.shotsHome : Object.values(penData.shotsHome)) : [];
                const rawAway = penData.shotsAway ? (Array.isArray(penData.shotsAway) ? penData.shotsAway : Object.values(penData.shotsAway)) : [];

                // 4. Renderiza as esteiras passando os dados brutos e o cobrador atual
                renderTrack('home', rawHome, penData.currentSide === 'home' ? penData.currentIndex : -1);
                renderTrack('away', rawAway, penData.currentSide === 'away' ? penData.currentIndex : -1);
            });
        });

        function renderTrack(side, shotsArray, activeIndex) {
            const trackContainer = document.getElementById(`track-${side}`);
            trackContainer.innerHTML = '';

            // Mapeia e extrai o status de forma limpa sem apagar os dados
            const cleanShots = shotsArray.map(item => {
                if (!item) return '';
                const value = (typeof item === 'object' && item.status) ? item.status : item;
                return String(value).toUpperCase().trim();
            });

            // Garante o layout mínimo visual de 5 bolinhas na tela
            const totalSlots = Math.max(5, cleanShots.length + (activeIndex !== -1 ? 1 : 0));

            for (let i = 0; i < totalSlots; i++) {
                const slot = document.createElement('div');
                slot.className = 'ball-slot';
                slot.textContent = i + 1;

                // Validação das classes CSS que dão cor às bolinhas
                if (cleanShots[i] === 'SUCCESS') {
                    slot.className = 'ball-slot success';
                    slot.innerHTML = '✓';
                } else if (cleanShots[i] === 'MISS') {
                    slot.className = 'ball-slot miss';
                    slot.innerHTML = '✕';
                } else if (i === activeIndex) {
                    slot.className = 'ball-slot next'; // Bolinha amarela piscante da cobrança atual
                }

                trackContainer.appendChild(slot);
            }
        }
    </script>
</body>
</html>
