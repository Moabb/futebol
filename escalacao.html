<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Overlay - Escalação Oficial com Campo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Space+Grotesk:wght=500;700&family=Kanit:wght=600;800&display=swap');

        /* Configuração de transparência absoluta para o OBS Studio */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
        }

        #lineup-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            width: 1280px;
            height: 720px;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 40px;
            padding: 40px;
            box-sizing: border-box;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #lineup-wrapper.visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        /* PAINEL ESQUERDO: LISTA DE JOGADORES */
        .list-panel {
            background: linear-gradient(135deg, var(--theme-primary, #1e1b4b) 0%, rgba(15, 23, 42, 0.95) 100%);
            border: 2px solid var(--theme-accent, #f59e0b);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .badge-indicator {
            display: flex;
            width: 16px;
            height: 32px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .badge-stripe { flex: 1; height: 100%; }

        .team-title {
            font-family: 'Kanit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .players-scroll {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
        }

        .player-row {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--theme-accent, #f59e0b);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .player-num {
            font-family: 'Orbitron', sans-serif;
            color: var(--theme-accent, #f59e0b);
            width: 40px;
            font-weight: 900;
            font-size: 20px;
        }

        .player-name {
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .coach-row {
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            display: flex;
            align-items: center;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }
        .coach-label {
            font-weight: 700;
            color: var(--theme-accent, #f59e0b);
            margin-right: 10px;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* PAINEL DIREITO: CAMPO TÁTICO 3D VIRTUAL */
        .field-panel {
            position: relative;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tactical-field {
            width: 100%;
            height: 580px;
            background: rgba(16, 185, 129, 0.2);
            border: 4px solid rgba(255,255,255,0.6);
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 100px rgba(0,0,0,0.5);
            transform: rotateX(25deg);
            transform-style: preserve-3d;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 0;
            box-sizing: border-box;
            backdrop-filter: blur(4px);
        }

        /* Linhas do Campo */
        .tactical-field::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.6);
            transform: translateY(-50%);
        }

        .field-line {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            z-index: 2;
            transform-style: preserve-3d;
        }

        .field-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: rotateX(-25deg) translateZ(20px);
            transition: all 0.5s ease;
        }

        .player-shirt {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 2px solid #ffffff;
        }

        .player-field-name {
            background: rgba(15, 23, 42, 0.9);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 8px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* ESTILIZAÇÕES ESPECÍFICAS DE ESTILOS */
        .theme-minimal .list-panel {
            transform: skewX(-6deg);
            border-radius: 0;
            border-left: 6px solid var(--theme-accent, #f59e0b);
        }
        .theme-minimal .player-row { transform: skewX(6deg); border-radius: 0; }
        .theme-minimal span, .theme-minimal div:not(.tactical-field):not(.field-line) { transform-style: flat; }

        .theme-monolith .list-panel {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .theme-monolith .player-row { border-left-width: 2px; background: transparent; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="lineup-wrapper" class="theme-cyber">
        <div class="list-panel">
            <div class="team-header">
                <div class="badge-indicator">
                    <div class="badge-stripe" id="list-badge-c1"></div>
                    <div class="badge-stripe" id="badge-stripe-c2"></div>
                </div>
                <div class="team-title" id="list-team-name">CASA</div>
            </div>

            <div class="players-scroll" id="players-list-container"></div>

            <div class="coach-row">
                <div class="coach-label">TÉCNICO:</div>
                <div id="coach-name">---</div>
            </div>
        </div>

        <div class="field-panel">
            <div class="tactical-field" id="tactical-field-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByxKPf3WJgGDLUiPNI_QnEmgsAn0y8s3k",
            authDomain: "moabb-futebol.firebaseapp.com",
            databaseURL: "https://moabb-futebol-default-rtdb.firebaseio.com",
            projectId: "moabb-futebol",
            storageBucket: "moabb-futebol.firebasestorage.app",
            messagingSenderId: "154044624617",
            appId: "1:154044624617:web:cbe332c5b1c468bd270a78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const activeMatchRef = ref(db, 'activeMatchId');

        onValue(activeMatchRef, (snapshot) => {
            const activeId = snapshot.val() || "jogo_padrao";
            console.log("Escalação sincronizada na partida ativa:", activeId);

            const matchRef = ref(db, 'matches/' + activeId);

            onValue(matchRef, (matchSnapshot) => {
                const data = matchSnapshot.val();
                if (!data) return;

                renderLineup(data);
            });
        });

        function renderLineup(data) {
            const wrapper = document.getElementById('lineup-wrapper');
            
            // 1. Verificação de Visibilidade do Overlay
            let isVisible = false;
            let targetTeam = 'home';

            if (data.overlays && data.overlays.escalacao) {
                if (typeof data.overlays.escalacao === 'object') {
                    isVisible = data.overlays.escalacao.visible === true;
                    targetTeam = data.overlays.escalacao.team === 'away' ? 'away' : 'home';
                } else if (typeof data.overlays.escalacao === 'boolean') {
                    isVisible = data.overlays.escalacao;
                    targetTeam = data.overlays.activeTeamLineup || 'home';
                }
            }
            
            // Controle de Exibição
            if (isVisible) {
                wrapper.classList.add('visible');
            } else {
                wrapper.classList.remove('visible');
                return;
            }
            
            // 2. Configurações de Design Visual
            const design = data.config?.design || { style: "cyber", primary: "#1e1b4b", secondary: "#0f172a", accent: "#f59e0b" };
            wrapper.className = 'visible';
            wrapper.classList.add(`theme-${design.style || 'cyber'}`);

            document.documentElement.style.setProperty('--theme-primary', design.primary || '#1e1b4b');
            document.documentElement.style.setProperty('--theme-secondary', design.secondary || '#0f172a');
            document.documentElement.style.setProperty('--theme-accent', design.accent || '#f59e0b');

            if (!data.config || !data.config[targetTeam]) return;

            const teamConfig = data.config[targetTeam];
            const teamStats = data.stats?.[targetTeam] || {};

            // Cores das Badges laterais
            const c1 = teamConfig.color1 || "#3b82f6";
            const c2 = teamConfig.color2 || "#ffffff";
            document.getElementById('list-badge-c1').style.backgroundColor = c1;
            document.getElementById('badge-stripe-c2').style.backgroundColor = c2;

            // Nome do Time e Técnico
            document.getElementById('list-team-name').textContent = teamConfig.name || "TIME";
            document.getElementById('coach-name').textContent = teamConfig.coach || "---";

            // 3. MAPEAMENTO REVOLUCIONADO DO BANCO (Suporta Objeto ou Lista)
            const rawLineup = teamStats.lineup || {};
            let lineUpPlayers = [];

            if (Array.isArray(rawLineup)) {
                lineUpPlayers = rawLineup.filter(Boolean);
            } else if (typeof rawLineup === 'object') {
                // No seu print, o nome do jogador é a chave (ex: "Adson")
                lineUpPlayers = Object.entries(rawLineup).map(([playerName, details]) => {
                    return {
                        name: playerName,
                        number: details.number ?? '',
                        position: details.position ?? 'Linha',
                        status: details.status ?? 'starter'
                    };
                });
            }

            // Filtragem de Titulares (Tolerante: Se ninguém estiver marcado, exibe todos os 11 primeiros)
            let starters = lineUpPlayers.filter(p => p.status === 'starter');
            if (starters.length === 0) {
                starters = lineUpPlayers.slice(0, 11);
            }

            // Ordenação por número da camisa
            starters.sort((a, b) => (parseInt(a.number) || 0) - (parseInt(b.number) || 0));

            // 4. Renderizar Lista Textual (Esquerda)
            const listContainer = document.getElementById('players-list-container');
            listContainer.innerHTML = '';

            starters.forEach(p => {
                const row = document.createElement('div');
                row.className = 'player-row';
                row.innerHTML = `
                    <div class="player-num">${p.number}</div>
                    <div class="player-name">${String(p.name).toUpperCase()}</div>
                `;
                listContainer.appendChild(row);
            });

            // 5. Renderizar o Campo Tático 3D (Direita)
            const field = document.getElementById('tactical-field-container');
            field.innerHTML = '';

            // Acha o Goleiro pela posição (GK) ou caso o nome contenha 'goleiro'
            const goalkeeper = starters.find(p => p.position === 'GK' || String(p.name).toUpperCase().includes('GOLEIRO'));
            const outfieldPlayers = starters.filter(p => p !== goalkeeper);

            // Goleiro na base do campo
            if (goalkeeper) {
                createFieldLine(field, [goalkeeper], c1, c2);
            }

            // Divisão das linhas com base no esquema tático (Ex: "4-4-2")
            const scheme = teamConfig.formation || "4-4-2";
            const lineCounts = typeof scheme === 'string' ? scheme.split('-').map(num => parseInt(num) || 2) : [4, 4, 2];

            let playerIndex = 0;
            lineCounts.forEach(count => {
                const playersInLine = [];
                for (let i = 0; i < count; i++) {
                    if (outfieldPlayers[playerIndex]) {
                        playersInLine.push(outfieldPlayers[playerIndex]);
                        playerIndex++;
                    }
                }
                if (playersInLine.length > 0) {
                    createFieldLine(field, playersInLine, c1, c2);
                }
            });
        }

        function createFieldLine(fieldContainer, playersArray, color1, color2) {
            const line = document.createElement('div');
            line.className = 'field-line';

            playersArray.forEach(p => {
                const pEl = document.createElement('div');
                pEl.className = 'field-player';
                
                const rawName = p.name ? String(p.name).trim() : 'JOGADOR';
                const shortName = rawName.split(' ')[0];
                
                pEl.innerHTML = `
                    <div class="player-shirt" style="background-color: ${color1}; color: ${color2};">
                        ${p.number || ''}
                    </div>
                    <div class="player-field-name">${shortName.toUpperCase()}</div>
                `;
                line.appendChild(pEl);
            });

            fieldContainer.insertBefore(line, fieldContainer.firstChild);
        }
    </script>
</body>
</html>
