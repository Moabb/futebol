<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay - Escalação Oficial com Campo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Space+Grotesk:wght=500;700&family=Kanit:wght=600;800&display=swap');

        /* Configuração de transparência absoluta para o OBS Studio em Full HD */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
            width: 1920px;
            height: 1080px;
        }

        /* Posicionamento absoluto original, calibrado proporcionalmente para 1920x1080 */
        #lineup-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            width: 1700px;
            height: 900px;
            display: grid;
            grid-template-columns: 460px 1fr;
            gap: 50px;
            padding: 40px;
            box-sizing: border-box;
            opacity: 0;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
        }

        #lineup-wrapper.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Container da Lista de Jogadores */
        .players-list-container {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.98) 0%, rgba(30, 27, 75, 0.98) 100%);
            border-left: 5px solid #f59e0b;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .team-color-bar {
            width: 16px;
            height: 50px;
            border-radius: 4px;
        }

        .team-title-box {
            display: flex;
            flex-direction: column;
        }

        .badge-sub {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #f59e0b;
            letter-spacing: 3px;
        }

        .team-name-display {
            font-family: 'Kanit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.1;
            letter-spacing: 1px;
        }

        .list-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Custom Scrollbar */
        .list-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .list-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        .list-scroll::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 3px;
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .player-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            width: 40px;
            text-align: center;
            color: #f59e0b;
        }

        .player-name {
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Container do Campo de Futebol */
        .field-container {
            background: radial-gradient(circle at center, rgba(16, 185, 129, 0.25) 0%, rgba(4, 120, 87, 0.4) 100%), 
                        linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(30, 27, 75, 0.95) 100%);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            padding: 40px;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
            position: relative;
        }

        .tactical-field {
            flex: 1;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 20px 0;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.15);
        }

        /* Linhas do Campo */
        .tactical-field::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.3);
            transform: translateY(-50%);
            pointer-events: none;
        }

        .tactical-field::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .field-line {
            display: flex;
            justify-content: center;
            gap: 65px;
            width: 100%;
            z-index: 2;
        }

        .field-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: player-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes player-pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .player-shirt {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 900;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5), inset 0 -4px 8px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.35);
        }

        .player-field-name {
            font-size: 13px;
            font-weight: 700;
            background: rgba(15, 23, 42, 0.9);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="lineup-wrapper">
        <div class="players-list-container">
            <div class="team-header">
                <div class="team-color-bar" id="ui-color-bar"></div>
                <div class="team-title-box">
                    <span class="badge-sub">ESCALAÇÃO</span>
                    <div class="team-name-display" id="ui-team-name">NOME DO TIME</div>
                </div>
            </div>
            <div class="list-scroll" id="ui-players-list">
                </div>
        </div>

        <div class="field-container">
            <div class="tactical-field" id="ui-tactical-field">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByxKPf3WJgGDLUiPNI_QnEmgsAn0y8s3k",
            authDomain: "moabb-futebol.firebaseapp.com",
            databaseURL: "https://moabb-futebol-default-rtdb.firebaseio.com",
            projectId: "moabb-futebol",
            storageBucket: "moabb-futebol.firebasestorage.app",
            messagingSenderId: "154044624617",
            appId: "1:154044624617:web:cbe332c5b1c468bd270a78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const activeMatchRef = ref(db, 'activeMatchId');

        onValue(activeMatchRef, (snapshot) => {
            const activeId = snapshot.val() || "jogo_padrao";
            const matchRef = ref(db, 'matches/' + activeId);

            onValue(matchRef, (matchSnapshot) => {
                const data = matchSnapshot.val();
                if (!data) return;

                const targetSide = data.overlays?.lineupSide || 'home';
                const teamConfig = data.config?.[targetSide] || {};
                const teamPlayers = data.players?.[targetSide] || [];

                const c1 = teamConfig.color1 || '#3b82f6';
                const c2 = teamConfig.color2 || '#ffffff';
                
                document.getElementById('ui-team-name').textContent = teamConfig.name || (targetSide === 'home' ? "CASA" : "VISITANTE");
                document.getElementById('ui-color-bar').style.backgroundColor = c1;

                const wrapper = document.getElementById('lineup-wrapper');
                if (data.overlays?.lineup === true) {
                    wrapper.classList.add('visible');
                } else {
                    wrapper.classList.remove('visible');
                }

                renderTextList(teamPlayers);
                renderTacticalField(teamPlayers, c1, c2, teamConfig.formation);
            });
        });

        function renderTextList(players) {
            const container = document.getElementById('ui-players-list');
            container.innerHTML = '';

            const validPlayers = players.filter(p => p && p.name && p.name.trim() !== '');

            validPlayers.forEach(p => {
                const row = document.createElement('div');
                row.className = 'player-row';
                row.innerHTML = `
                    <div class="player-number">${String(p.number).padStart(2, '0')}</div>
                    <div class="player-name">${p.name.toUpperCase()}</div>
                `;
                container.appendChild(row);
            });
        }

        function renderTacticalField(players, c1, c2, formation) {
            const field = document.getElementById('ui-tactical-field');
            field.innerHTML = '';

            const validPlayers = players.filter(p => p && p.name && p.name.trim() !== '');
            if (validPlayers.length === 0) return;

            const gk = validPlayers[0];
            const outfieldPlayers = validPlayers.slice(1);

            const gkLine = document.createElement('div');
            gkLine.className = 'field-line';
            gkLine.innerHTML = `
                <div class="field-player">
                    <div class="player-shirt" style="background-color: #f59e0b; color: #000000;">${gk.number}</div>
                    <div class="player-field-name">${gk.name.split(' ')[0].toUpperCase()}</div>
                </div>
            `;
            field.appendChild(gkLine);

            const formatString = formation || "4-4-2";
            const lineCounts = formatString.split('-').map(num => parseInt(num) || 2);

            let playerIndex = 0;
            lineCounts.forEach(count => {
                const currentLinePlayers = [];
                for (let i = 0; i < count; i++) {
                    if (outfieldPlayers[playerIndex]) {
                        currentLinePlayers.push(outfieldPlayers[playerIndex]);
                        playerIndex++;
                    }
                }
                if (currentLinePlayers.length > 0) {
                    createFieldLine(field, currentLinePlayers, c1, c2);
                }
            });
        }

        function createFieldLine(fieldContainer, playersArray, color1, color2) {
            const line = document.createElement('div');
            line.className = 'field-line';

            playersArray.forEach(p => {
                const pEl = document.createElement('div');
                pEl.className = 'field-player';
                
                const shortName = p.name.split(' ')[0];
                
                pEl.innerHTML = `
                    <div class="player-shirt" style="background-color: ${color1}; color: ${color2};">
                        ${p.number}
                    </div>
                    <div class="player-field-name">${shortName.toUpperCase()}</div>
                `;
                line.appendChild(pEl);
            });

            fieldContainer.insertBefore(line, fieldContainer.firstChild);
        }
    </script>
</body>
</html>
