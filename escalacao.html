<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay - Escalação Oficial com Campo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Space+Grotesk:wght=500;700&family=Kanit:wght=600;800&display=swap');

        /* Configuração de transparência absoluta para o OBS Studio */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
        }

        #lineup-wrapper {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -60%);
            width: 1280px;
            height: 720px;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 40px;
            padding: 40px;
            box-sizing: border-box;
            opacity: 0; /* Começa oculto e obedece o painel */
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Ativado dinamicamente pelo painel */
        #lineup-wrapper.visible {
            opacity: 1;
            transform: translate(-50%, -50%);
            pointer-events: auto;
        }

        /* PAINEL ESQUERDO: LISTA DE JOGADORES */
        .list-panel {
            background: linear-gradient(135deg, #1f2e45c7 0%, rgb(15 23 42 / 90%) 100%);
            border: 2px solid var(--theme-accent, #f59e0b);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .badge-indicator {
            display: flex;
            width: 16px;
            height: 32px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .badge-stripe { flex: 1; height: 100%; }

        .team-title {
            font-family: 'Kanit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .players-scroll {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
        }

        .player-row {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.192);
            border-left: 4px solid var(--theme-accent, #f59e0b);
            padding: 0px 15px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .player-num {
            font-family: 'Orbitron', sans-serif;
            color: var(--theme-accent, #f59e0b);
            width: 40px;
            font-weight: 900;
            font-size: 20px;
        }

        .player-name {
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .coach-row {
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            display: flex;
            align-items: center;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }
        .coach-label {
            font-weight: 700;
            color: var(--theme-accent, #f59e0b);
            margin-right: 10px;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* PAINEL DIREITO: CAMPO TÁTICO ESTILIZADO */
        .field-panel {
            position: relative;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tactical-field {
            width: 100%;
            height: 850px;
            background: #155e75d6; /* Gramado */
            background-image: linear-gradient(rgba(255,255,255,0.05) 50%, transparent 50%);
            background-size: 100% 60px;
            border: 4px solid #ffffff;
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 100px rgba(0,0,0,0.6);
            /*transform: rotateX(20deg);
            transform-style: preserve-3d;*/
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 0;
            box-sizing: border-box;
        }

        /* Linha do meio de campo */
        .tactical-field::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.8);
            transform: translateY(-50%);
        }

        /* Círculo central */
        .tactical-field::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 160px;
            height: 160px;
            border: 4px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .field-line {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            z-index: 5;
            transform-style: preserve-3d;
        }

        .field-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: rotateX(-20deg) translateZ(25px);
            transition: all 0.5s ease;
        }

        .player-shirt {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 3px solid #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .player-field-name {
            background: rgba(15, 23, 42, 0.95);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 8px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.3);
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* TEMAS ADAPTATIVOS */
        .theme-minimal .list-panel {
            transform: skewX(-6deg);
            border-radius: 0;
            border-left: 6px solid var(--theme-accent, #f59e0b);
        }
        .theme-minimal .player-row { transform: skewX(6deg); border-radius: 0; }

        .theme-monolith .list-panel {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .theme-monolith .player-row { border-left-width: 2px; background: transparent; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="lineup-wrapper">
        <div class="list-panel">
            <div class="team-header">
                <div class="badge-indicator">
                    <div class="badge-stripe" id="list-badge-c1"></div>
                    <div class="badge-stripe" id="badge-stripe-c2"></div>
                </div>
                <div class="team-title" id="list-team-name">CASA</div>
            </div>

            <div class="players-scroll" id="players-list-container"></div>

            <div class="coach-row">
                <div class="coach-label">TÉCNICO:</div>
                <div id="coach-name">---</div>
            </div>
        </div>

        <div class="field-panel">
            <div class="tactical-field" id="tactical-field-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByxKPf3WJgGDLUiPNI_QnEmgsAn0y8s3k",
            authDomain: "moabb-futebol.firebaseapp.com",
            databaseURL: "https://moabb-futebol-default-rtdb.firebaseio.com",
            projectId: "moabb-futebol",
            storageBucket: "moabb-futebol.firebasestorage.app",
            messagingSenderId: "154044624617",
            appId: "1:154044624617:web:cbe332c5b1c468bd270a78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const activeMatchRef = ref(db, 'activeMatchId');

        onValue(activeMatchRef, (snapshot) => {
            const activeId = snapshot.val() || "jogo_padrao";
            console.log("Escalação sincronizada na partida ativa:", activeId);

            const matchRef = ref(db, 'matches/' + activeId);

            onValue(matchRef, (matchSnapshot) => {
                const data = matchSnapshot.val();
                if (!data) return;

                renderLineup(data);
            });
        });

        function renderLineup(data) {
            const wrapper = document.getElementById('lineup-wrapper');
            
            // 1. MAPEAMENTO DE EXIBIÇÃO CORRIGIDO (Letras minúsculas para alinhar com o painel)
            let isVisible = false;
            let targetTeam = 'home';

            if (data.overlays) {
                // Se lineupHome for true, exibe o mandante. Se lineupAway for true, exibe o visitante.
                if (data.overlays.lineupHome === true) {
                    isVisible = true;
                    targetTeam = 'home';
                } else if (data.overlays.lineupAway === true) {
                    isVisible = true;
                    targetTeam = 'away';
                }
            }
            
            // Gerencia de forma dinâmica a visibilidade
            if (isVisible) {
                wrapper.classList.add('visible');
            } else {
                wrapper.classList.remove('visible');
            }
            
            // 2. CONFIGURAÇÕES VISUAIS DE DESIGN E TEMA
            const design = data.config?.design || { style: "cyber", primary: "#1e1b4b", secondary: "#0f172a", accent: "#f59e0b" };
            wrapper.classList.remove('theme-cyber', 'theme-minimal', 'theme-monolith');
            wrapper.classList.add(`theme-${design.style || 'cyber'}`);

            document.documentElement.style.setProperty('--theme-primary', design.primary || '#1e1b4b');
            document.documentElement.style.setProperty('--theme-secondary', design.secondary || '#0f172a');
            document.documentElement.style.setProperty('--theme-accent', design.accent || '#f59e0b');

            if (!data.config || !data.config[targetTeam]) return;

            const teamConfig = data.config[targetTeam];

            // Cores das faixas laterais do time selecionado
            const c1 = teamConfig.color1 || "#3b82f6";
            const c2 = teamConfig.color2 || "#ffffff";
            document.getElementById('list-badge-c1').style.backgroundColor = c1;
            document.getElementById('badge-stripe-c2').style.backgroundColor = c2;

            // Nome do Time e Técnico dinâmicos
            document.getElementById('list-team-name').textContent = teamConfig.name || "TIME";
            document.getElementById('coach-name').textContent = teamConfig.coach || "---";

            // 3. PROCESSADOR INTELIGENTE DA STRING DE JOGADORES DO TIME ALVO
            let lineUpPlayers = [];
            const rawPlayersString = teamConfig.players || "";

            if (rawPlayersString && typeof rawPlayersString === 'string') {
                const regex = /(\d+)\s*-\s*([^0-9\-]+)/g;
                let match;
                
                while ((match = regex.exec(rawPlayersString)) !== null) {
                    const num = match[1].trim();
                    const name = match[2].replace(/\s+-\s*$/, '').trim();
                    
                    if (name) {
                        lineUpPlayers.push({
                            number: num,
                            name: name,
                            position: lineUpPlayers.length === 0 ? 'GK' : 'Linha'
                        });
                    }
                }
            }

            // Fallback caso a formatação mude
            if (lineUpPlayers.length === 0 && rawPlayersString) {
                const parts = rawPlayersString.split('-');
                parts.forEach((part, index) => {
                    const clean = part.trim();
                    if (clean) {
                        lineUpPlayers.push({
                            number: index + 1,
                            name: clean,
                            position: index === 0 ? 'GK' : 'Linha'
                        });
                    }
                });
            }

            const starters = lineUpPlayers.slice(0, 18);

            // 4. RENDERIZAR LISTA LATERAL (ESQUERDA)
            const listContainer = document.getElementById('players-list-container');
            listContainer.innerHTML = '';

            starters.forEach(p => {
                const row = document.createElement('div');
                row.className = 'player-row';
                row.innerHTML = `
                    <div class="player-num">${p.number}</div>
                    <div class="player-name">${p.name.toUpperCase()}</div>
                `;
                listContainer.appendChild(row);
            });

            // 5. RENDERIZAR O CAMPO TÁTICO VIRTUAL COM CORES E GRAMADO (DIREITA)
            const field = document.getElementById('tactical-field-container');
            field.innerHTML = '';

            const goalkeeper = starters[0];
            const outfieldPlayers = starters.slice(1);

            if (goalkeeper) {
                createFieldLine(field, [goalkeeper], c1, c2);
            }

            // AJUSTADO: Agora lê 'tactic' vindo do painel de controle
            const scheme = teamConfig.tactic || teamConfig.formation || "4-4-2";
            const lineCounts = typeof scheme === 'string' ? scheme.split('-').map(num => parseInt(num) || 2) : [4, 4, 2];

            let playerIndex = 0;
            lineCounts.forEach(count => {
                const currentLinePlayers = [];
                for (let i = 0; i < count; i++) {
                    if (outfieldPlayers[playerIndex]) {
                        currentLinePlayers.push(outfieldPlayers[playerIndex]);
                        playerIndex++;
                    }
                }
                if (currentLinePlayers.length > 0) {
                    createFieldLine(field, currentLinePlayers, c1, c2);
                }
            });
        }

        function createFieldLine(fieldContainer, playersArray, color1, color2) {
            const line = document.createElement('div');
            line.className = 'field-line';

            playersArray.forEach(p => {
                const pEl = document.createElement('div');
                pEl.className = 'field-player';
                
                const shortName = p.name.split(' ')[0];
                
                pEl.innerHTML = `
                    <div class="player-shirt" style="background-color: ${color1}; color: ${color2};">
                        ${p.number}
                    </div>
                    <div class="player-field-name">${shortName.toUpperCase()}</div>
                `;
                line.appendChild(pEl);
            });

            fieldContainer.insertBefore(line, fieldContainer.firstChild);
        }
    </script>
</body>
</html>
